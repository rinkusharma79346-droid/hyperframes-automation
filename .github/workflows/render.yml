name: HyperFrames Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Google Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install FFmpeg + Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xdg-utils

      - name: Install HyperFrames CLI
        run: npm install --no-audit --no-fund hyperframes

      - name: Render video
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: |
          echo "Using Chrome at: $CHROME_BIN"
          npx hyperframes render --output vayu_google_output.mp4

      - name: Verify rendered file exists
        run: |
          test -f vayu_google_output.mp4
          ls -lh vayu_google_output.mp4

      - name: Upload rendered video artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperframes-render-output
          path: vayu_google_output.mp4
          if-no-files-found: error
