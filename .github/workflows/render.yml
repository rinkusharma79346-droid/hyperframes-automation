name: HyperFrames Render

on:
  push:

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install FFmpeg and runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            xdg-utils

      - name: Install hyperframes
        run: npm install --no-audit --no-fund hyperframes

      - name: Render video
        run: npx hyperframes render --output vayu_google_output.mp4

      - name: Upload rendered video artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperframes-render-output
          path: vayu_google_output.mp4
