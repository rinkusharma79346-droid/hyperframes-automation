name: HyperFrames Render Pipeline

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates fonts-liberation libappindicator3-1 libasound2 libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libnspr4 libnss3 libu2f-udev libvulkan1 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 xdg-utils

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install hyperframes
        run: npm install --prefer-offline --no-audit --progress=false hyperframes

      - name: Render with HyperFrames
        run: npx hyperframes render --output vayu_google_output.mp4

      - name: Upload rendered video artifact
        uses: actions/upload-artifact@v4
        with:
          name: vayu_google_output
          path: vayu_google_output.mp4
